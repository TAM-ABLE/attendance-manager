<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット</title>
</head>
<body style="font-family: sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <div style="background-color: #f8f9fa; border-radius: 8px; padding: 32px; text-align: center;">
    <h1 style="color: #1a1a2e; font-size: 20px; margin-bottom: 16px;">パスワードリセット</h1>
    <p style="margin-bottom: 24px;">
      パスワードリセットのリクエストを受け付けました。<br>
      以下のボタンから新しいパスワードを設定してください。
    </p>
    <a href="{{ .SiteURL }}/auth/v1/verify?token={{ .TokenHash }}&type=recovery&redirect_to={{ .SiteURL }}/set-password" style="display: inline-block; background-color: #1a1a2e; color: #ffffff; text-decoration: none; padding: 12px 32px; border-radius: 6px; font-weight: bold;">
      パスワードを再設定する
    </a>
    <p style="margin-top: 24px; font-size: 14px; color: #666;">
      このリンクは24時間有効です。心当たりがない場合は、このメールを無視してください。
    </p>
  </div>
</body>
</html>
